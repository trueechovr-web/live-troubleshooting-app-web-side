openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: True Echo VR Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management (TEVR admin)
  - name: headsets
    description: Headset management
  - name: sessions
    description: Streaming session management
  - name: messages
    description: Session messaging
  - name: locations
    description: Customer location management
  - name: qr-dictionary
    description: Company-wide QR code name dictionary
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{customerId}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{customerId}/point-to-objects:
    put:
      operationId: updateCustomerPointToObjects
      tags: [customers]
      summary: Replace the customer's Point-to object menu
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointToObjects"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{customerId}/feature-flags:
    put:
      operationId: updateCustomerFeatureFlags
      tags: [customers]
      summary: Enable or disable premium features for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeatureFlagsBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{customerId}/session-history:
    get:
      operationId: getSessionHistory
      tags: [sessions]
      summary: Get session history with AI summaries for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of ended sessions with summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionHistoryItem"

  /customers/{customerId}/locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all locations for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of locations with QR code count and calibration info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocationSummary"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a new location for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationBody"
      responses:
        "201":
          description: Created location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationSummary"

  /customers/{customerId}/locations/{locationId}:
    put:
      operationId: updateLocation
      tags: [locations]
      summary: Update a location's name
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationBody"
      responses:
        "200":
          description: Updated location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationSummary"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a location and all its QR codes
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Location deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /locations/{locationId}/qr-code-settings:
    get:
      operationId: getLocationQrCodeSettings
      tags: [locations]
      summary: Get all dictionary entries for a location merged with calibration data and enabled status (admin-facing)
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merged view of dictionary entries, calibration data, and enabled flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationQrCodeSettingsView"

  /locations/{locationId}/qr-code-settings/{qrDictionaryEntryId}:
    put:
      operationId: setLocationQrCodeSetting
      tags: [locations]
      summary: Enable or disable a dictionary entry for a specific location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
        - name: qrDictionaryEntryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetQrCodeSettingBody"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCodeSettingResult"

  /locations/{locationId}/qr-codes:
    get:
      operationId: getLocationQrCodes
      tags: [locations]
      summary: Get all calibrated QR codes for a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR codes for the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationQrData"
    put:
      operationId: importLocationQrCodes
      tags: [locations]
      summary: Import QR code calibration data (replaces existing)
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportQrCodesBody"
      responses:
        "200":
          description: Import successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationQrData"
    delete:
      operationId: clearLocationQrCodes
      tags: [locations]
      summary: Clear all QR code calibration data for a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calibration cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /customers/{customerId}/qr-dictionary:
    get:
      operationId: listQrDictionary
      tags: [qr-dictionary]
      summary: Get all QR code name entries for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of QR dictionary entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QrDictionaryEntry"
    post:
      operationId: createQrDictionaryEntry
      tags: [qr-dictionary]
      summary: Add a new QR code name entry
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQrDictionaryEntryBody"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrDictionaryEntry"

  /customers/{customerId}/qr-dictionary/{entryId}:
    put:
      operationId: updateQrDictionaryEntry
      tags: [qr-dictionary]
      summary: Update a QR code name entry
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQrDictionaryEntryBody"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrDictionaryEntry"
    delete:
      operationId: deleteQrDictionaryEntry
      tags: [qr-dictionary]
      summary: Delete a QR code name entry
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /headsets:
    get:
      operationId: listHeadsets
      tags: [headsets]
      summary: List available headsets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [online, offline, busy]
      responses:
        "200":
          description: List of headsets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Headset"

  /headsets/{headsetId}:
    get:
      operationId: getHeadset
      tags: [headsets]
      summary: Get a single headset by ID
      parameters:
        - name: headsetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Headset record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Headset"
        "404":
          description: Headset not found

  /headsets/{headsetId}/startup-data:
    get:
      operationId: getHeadsetStartupData
      tags: [headsets]
      summary: Get startup sync data — called by Unity when the headset app launches
      parameters:
        - name: headsetId
          in: path
          required: true
          schema:
            type: string
        - name: locationId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Location QR data merged with names plus the full company name dictionary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeadsetStartupData"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List active streaming sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new streaming session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    delete:
      operationId: endSession
      tags: [sessions]
      summary: End a streaming session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /sessions/{sessionId}/point-to-events:
    get:
      operationId: getSessionPointToEvents
      tags: [sessions]
      summary: Get all point-to object events for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of point-to events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointToEvent"

  /sessions/{sessionId}/feedback:
    patch:
      operationId: submitSessionFeedback
      tags: [sessions]
      summary: Submit post-session admin feedback (issue description + resolution status)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionFeedbackBody"
      responses:
        "204":
          description: Feedback saved

  /sessions/{sessionId}/transcript-chunk:
    post:
      operationId: appendTranscriptChunk
      tags: [sessions]
      summary: Append a transcribed audio chunk to a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptChunkBody"
      responses:
        "204":
          description: Chunk appended

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [customers]
      summary: Get TEVR dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Customer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contactEmail:
          type: string
        programVersion:
          type: string
        headsetCount:
          type: integer
        activeHeadsets:
          type: integer
        status:
          type: string
          enum: [active, inactive, trial]
        pointToObjects:
          $ref: "#/components/schemas/PointToObjects"
        sessionHistoryEnabled:
          type: boolean
        createdAt:
          type: string
      required: [id, name, contactEmail, programVersion, headsetCount, activeHeadsets, status, pointToObjects, sessionHistoryEnabled, createdAt]

    PointToChild:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 80
      required: [label]
      additionalProperties: false

    PointToItem:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 80
        children:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/PointToChild"
      required: [label]
      additionalProperties: false

    PointToObjects:
      type: array
      maxItems: 50
      items:
        $ref: "#/components/schemas/PointToItem"

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        contactEmail:
          type: string
        programVersion:
          type: string
      required: [name, contactEmail, programVersion]

    LocationSummary:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        name:
          type: string
        createdAt:
          type: string
        qrCodeCount:
          type: integer
        lastCalibratedAt:
          type: string
        lastCalibratedByHeadsetId:
          type: string
      required: [id, customerId, name, createdAt, qrCodeCount]

    CreateLocationBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required: [name]

    Vec3:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      required: [x, y, z]

    Vec4:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
        w:
          type: number
      required: [x, y, z, w]

    QrCode:
      type: object
      properties:
        id:
          type: string
        locationId:
          type: string
        qrValue:
          type: string
        posX:
          type: number
        posY:
          type: number
        posZ:
          type: number
        rotX:
          type: number
        rotY:
          type: number
        rotZ:
          type: number
        rotW:
          type: number
        calibratedAt:
          type: string
        headsetId:
          type: string
      required: [id, locationId, qrValue, posX, posY, posZ, rotX, rotY, rotZ, rotW, calibratedAt]

    LocationQrData:
      type: object
      properties:
        locationId:
          type: string
        locationName:
          type: string
        qrCodes:
          type: array
          items:
            $ref: "#/components/schemas/QrCode"
        lastCalibratedAt:
          type: string
        lastCalibratedByHeadsetId:
          type: string
      required: [locationId, locationName, qrCodes]

    QrCodeImportItem:
      type: object
      properties:
        qrValue:
          type: string
          minLength: 1
        position:
          $ref: "#/components/schemas/Vec3"
        rotation:
          $ref: "#/components/schemas/Vec4"
      required: [qrValue, position, rotation]

    ImportQrCodesBody:
      type: object
      properties:
        headsetId:
          type: string
        qrCodes:
          type: array
          items:
            $ref: "#/components/schemas/QrCodeImportItem"
      required: [qrCodes]

    QrDictionaryEntry:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        qrValue:
          type: string
        name:
          type: string
        updatedAt:
          type: string
      required: [id, customerId, qrValue, name, updatedAt]

    CreateQrDictionaryEntryBody:
      type: object
      properties:
        qrValue:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 100
      required: [qrValue, name]

    HeadsetStartupQrCode:
      type: object
      properties:
        qrValue:
          type: string
        name:
          type: string
        position:
          $ref: "#/components/schemas/Vec3"
        rotation:
          $ref: "#/components/schemas/Vec4"
      required: [qrValue, position, rotation]

    HeadsetStartupData:
      type: object
      properties:
        locationId:
          type: string
        locationName:
          type: string
        qrCodes:
          type: array
          items:
            $ref: "#/components/schemas/HeadsetStartupQrCode"
        nameDictionary:
          type: array
          items:
            type: object
            properties:
              qrValue:
                type: string
              name:
                type: string
            required: [qrValue, name]
      required: [locationId, locationName, qrCodes, nameDictionary]

    Headset:
      type: object
      properties:
        id:
          type: string
        serialNumber:
          type: string
        label:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        status:
          type: string
          enum: [online, offline, busy]
        batteryLevel:
          type: integer
        firmwareVersion:
          type: string
        lastSeen:
          type: string
      required: [id, serialNumber, label, customerId, customerName, status, batteryLevel, firmwareVersion, lastSeen]

    Session:
      type: object
      properties:
        id:
          type: string
        headsetId:
          type: string
        headsetLabel:
          type: string
        adminRole:
          type: string
        techRole:
          type: string
        status:
          type: string
          enum: [waiting, active, ended]
        roomCode:
          type: string
        startedAt:
          type: string
        endedAt:
          type: string
      required: [id, headsetId, headsetLabel, status, roomCode, startedAt]

    CreateSessionBody:
      type: object
      properties:
        headsetId:
          type: string
        role:
          type: string
          enum: [admin, tech]
      required: [headsetId, role]

    Message:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        senderRole:
          type: string
          enum: [admin, tech]
        content:
          type: string
        sentAt:
          type: string
      required: [id, sessionId, senderRole, content, sentAt]

    SendMessageBody:
      type: object
      properties:
        senderRole:
          type: string
          enum: [admin, tech]
        content:
          type: string
      required: [senderRole, content]

    DashboardSummary:
      type: object
      properties:
        totalCustomers:
          type: integer
        totalHeadsets:
          type: integer
        activeHeadsets:
          type: integer
        activeSessions:
          type: integer
        customersByStatus:
          type: object
          properties:
            active:
              type: integer
            inactive:
              type: integer
            trial:
              type: integer
          required: [active, inactive, trial]
      required: [totalCustomers, totalHeadsets, activeHeadsets, activeSessions, customersByStatus]

    UpdateFeatureFlagsBody:
      type: object
      properties:
        sessionHistoryEnabled:
          type: boolean
      required: [sessionHistoryEnabled]

    SessionFeedbackBody:
      type: object
      properties:
        issueDescription:
          type: string
        resolved:
          type: boolean
      required: [issueDescription, resolved]

    TranscriptChunkBody:
      type: object
      properties:
        speaker:
          type: string
          enum: [admin, tech]
        text:
          type: string
      required: [speaker, text]

    LocationQrCodeSettingEntry:
      type: object
      properties:
        qrDictionaryEntryId:
          type: string
        qrValue:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        posX:
          type: number
        posY:
          type: number
        posZ:
          type: number
        rotX:
          type: number
        rotY:
          type: number
        rotZ:
          type: number
        rotW:
          type: number
        calibratedAt:
          type: string
        headsetId:
          type: string
      required: [qrDictionaryEntryId, qrValue, name, enabled]

    LocationQrCodeSettingsView:
      type: object
      properties:
        locationId:
          type: string
        locationName:
          type: string
        entries:
          type: array
          items:
